name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
assignees:
  - Varionetzwerk

body:
  - type: markdown
    attributes:
      value: |
        Got an idea? Describe it below!

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      placeholder: "I always have to manually open the clips folder because..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe your idea
      placeholder: "Add a button in the clip library to..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you considered
      placeholder: "I could also use a file manager, but..."

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - Nice to have
        - Would use it a lot
        - Blocking me from using p2record
    validations:
      required: true
